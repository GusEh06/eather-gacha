version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: aether-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
      MONGO_INITDB_DATABASE: aether
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: aether-api
    restart: unless-stopped
    env_file: .env
    ports:
      - "3001:3001"
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - ./apps/api/src:/app/src   # hot reload en desarrollo

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: aether-web
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ./apps/web/src:/app/src   # hot reload en desarrollo

volumes:
  mongo_data:

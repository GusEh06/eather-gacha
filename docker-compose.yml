version: "3.9"

networks:
  aether:
    driver: bridge

services:
  mongo:
    image: mongo:7
    container_name: aether-mongo
    restart: unless-stopped
    networks:
      - aether
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
      MONGO_INITDB_DATABASE: aether
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  api:
    build:
      # Los Dockerfiles esperan el contexto en la RAÍZ del repo para poder
      # copiar packages/shared (ver apps/api/Dockerfile).
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: aether-api
    restart: unless-stopped
    networks:
      - aether
    env_file: .env
    ports:
      - "3001:3001"
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - ./apps/api:/repo/apps/api
      - /repo/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: aether-web
    restart: unless-stopped
    networks:
      - aether
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ./apps/web:/repo/apps/web
      - /repo/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true

  stripe-cli:
    image: stripe/stripe-cli:latest
    container_name: aether-stripe-cli
    restart: unless-stopped
    networks:
      - aether
    depends_on:
      - api
    environment:
      - STRIPE_API_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_DEVICE_NAME=aether-docker
    command: >
      listen
      --api-key ${STRIPE_SECRET_KEY}
      --forward-to http://api:3001/vault/webhook
      --events checkout.session.completed

volumes:
  mongo_data:
